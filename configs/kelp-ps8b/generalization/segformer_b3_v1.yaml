seed_everything: 42

model:
  class_path: src.models.smp.SMPBinarySegmentationModel
  init_args:
    architecture: Segformer
    encoder_name: mit_b3
    model_opts:
      encoder_weights: imagenet
      in_channels: 8
    num_classes: 1
    ignore_index: &ignore_index -100
    optimizer_class: torch.optim.AdamW
    optimizer_opts:
      lr: 0.0003
      weight_decay: 0.01
      betas: [0.9, 0.95]
    lr_scheduler_class: src.schedulers.LinearWarmupCosineDecayLR
    lr_scheduler_opts:
      warmup_epochs: 5
      min_lr: 0.000003
    lr_scheduler_interval: step
    loss: LabelSmoothingLovasz
    loss_opts:
      mode: binary
      ce_weight: 0.7
      lovasz_weight: 0.3
      ignore_index: *ignore_index

data:
  class_path: src.data.DataModule
  init_args:
    train_chip_dir: /home/sky/data/planet8b_all_regions_1024_512_v2/views/baseline_temporal_v1/train
    val_chip_dir: /home/sky/data/planet8b_all_regions_1024_512_v2/views/baseline_temporal_v1/val
    test_chip_dir: /home/sky/data/planet8b_all_regions_1024_512_v2/views/baseline_temporal_v1/test
    batch_size: 3
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    train_transforms:
      __version__: 2.0.8
      transform:
        __class_fullname__: Compose
        additional_targets: {}
        bbox_params: null
        is_check_shapes: true
        keypoint_params: null
        p: 1.0
        seed: 42
        transforms:
          - __class_fullname__: RandomCrop
            border_mode: 0
            fill: 0.0
            fill_mask: *ignore_index
            height: 1024
            p: 1.0
            pad_if_needed: true
            pad_position: center
            width: 1024
          - __class_fullname__: ToFloat
            max_value: 4000.0
            p: 1.0
          - __class_fullname__: SquareSymmetry
            p: 1.0
          - __class_fullname__: RandomBrightnessContrast
            brightness_by_max: false
            brightness_limit: [-0.2, 0.2]
            contrast_limit: [0.0, 0.0]
            ensure_safe_range: false
            p: 0.3
          - __class_fullname__: CoarseDropout
            fill: 0.0
            fill_mask: *ignore_index
            hole_height_range: [0, 32]
            hole_width_range: [0, 32]
            num_holes_range: [1, 8]
            p: 0.5
          - __class_fullname__: Normalize
            max_pixel_value: 1.0
            mean: [0.43, 0.42875, 0.47825, 0.522, 0.5685, 0.5725, 0.65325, 0.9925]
            normalization: standard
            p: 1.0
            std: [0.18675, 0.1745, 0.18475, 0.192, 0.21225, 0.217, 0.21225, 0.2285]
          - __class_fullname__: ToTensorV2
            p: 1.0
            transpose_mask: false
    test_transforms:
      __version__: 2.0.8
      transform:
        __class_fullname__: Compose
        additional_targets: {}
        bbox_params: null
        is_check_shapes: true
        keypoint_params: null
        p: 1.0
        seed: null
        transforms:
          - __class_fullname__: PadIfNeeded
            border_mode: 0
            fill: 0.0
            fill_mask: *ignore_index
            min_height: 1024
            min_width: 1024
            p: 1.0
            pad_height_divisor: null
            pad_width_divisor: null
            position: center
          - __class_fullname__: Normalize
            max_pixel_value: 4000.0
            mean: [0.43, 0.42875, 0.47825, 0.522, 0.5685, 0.5725, 0.65325, 0.9925]
            normalization: standard
            p: 1.0
            std: [0.18675, 0.1745, 0.18475, 0.192, 0.21225, 0.217, 0.21225, 0.2285]
          - __class_fullname__: ToTensorV2
            p: 1.0
            transpose_mask: false

trainer:
  accelerator: auto
  devices: auto
  precision: bf16-mixed
  log_every_n_steps: 20
  max_epochs: 100
  accumulate_grad_batches: 8
  gradient_clip_val: 0.8
  detect_anomaly: false
  default_root_dir: /home/sky/experiments/planet8b-loro-v1/default
  fast_dev_run: false
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        entity: kdorman90-ucla
        project: kelpseg
        name: baseline-temporal-v1
        group: planet8b-loro-v1
        job_type: train
        log_model: false
        tags: [planet8b-loro-v1, baseline_training]
  callbacks:
    - class_path: src.callbacks.EMAWeightAveraging
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        auto_insert_metric_name: false
        filename: kelp_ps8b_segformer_b3_epoch-{epoch:02d}_val-iou-{val/iou_epoch:.4f}
        monitor: val/iou_epoch
        mode: max
        save_last: true
        save_top_k: 1
        save_weights_only: false
        verbose: true
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
  plugins:
    - class_path: lightning.pytorch.plugins.io.AsyncCheckpointIO
