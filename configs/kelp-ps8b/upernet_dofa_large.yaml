seed_everything: 42

model:
  class_path: "src.models.terratorch.TerraTorchSegmentationModel"
  init_args:
    num_classes: 1
    ignore_index: &ignore_index -100
    optimizer_class: torch.optim.AdamW
    optimizer_opts:
      lr: 1e-4
      weight_decay: 0.01
      betas:
        - 0.9
        - 0.99
    lr_scheduler_class: torch.optim.lr_scheduler.OneCycleLR
    lr_scheduler_opts:
      max_lr: 1e-4
      pct_start: 0.3
    lr_scheduler_interval: step
    loss: "LabelSmoothingLovasz"
    loss_opts:
      mode: "binary"
      ignore_index: *ignore_index
    model_opts:
      backbone: "dofa_large_patch16_224_custom"
      backbone_pretrained: true
      backbone_wavelengths:
        - 0.442  # Coastal
        - 0.49  # Blue
        - 0.531  # Green 1
        - 0.565  # Green 2
        - 0.610  # Yellow
        - 0.665  # Red
        - 0.705  # RE
        - 0.865  # NIR
      backbone_out_indices:
        - 5
        - 11
        - 17
        - 23
      necks:
        - name: ReshapeTokensToImage
          remove_cls_token: true
        - name: LearnedInterpolateToPyramidal
      decoder: UperNetDecoder
      decoder_channels: 512
      head_channel_list:
        - 512
      head_dropout: 0.1

data:
  class_path: "src.data.DataModule"
  init_args:
    train_chip_dir: /home/taylor/data/kelp-ps8b/224x112/cali_bc/kelp/train/
    val_chip_dir: /home/taylor/data/kelp-ps8b/224x224/cali_bc/full/val/
    test_chip_dir: /home/taylor/data/kelp-ps8b/224x224/cali_bc/full/test/
    batch_size: 16
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    train_transforms:
      __version__: 2.0.8
      transform:
        __class_fullname__: Compose
        additional_targets: { }
        bbox_params: null
        is_check_shapes: true
        keypoint_params: null
        p: 1.0
        seed: 42
        transforms:
          - __class_fullname__: RandomCrop
            border_mode: 0
            fill: 0.0
            fill_mask: 0.0
            height: 224
            p: 1.0
            pad_if_needed: true
            pad_position: center
            width: 224
          - __class_fullname__: ToFloat
            max_value: 4000.0
            p: 1.0
          - __class_fullname__: SquareSymmetry
            p: 1.0
          - __class_fullname__: RandomBrightnessContrast
            brightness_by_max: false
            brightness_limit:
              - -0.2
              - 0.2
            contrast_limit:
              - 0.0
              - 0.0
            ensure_safe_range: false
            p: 0.3
          - __class_fullname__: CoarseDropout
            fill: 0.0
            fill_mask: 0.0
            hole_height_range:
              - 0
              - 32
            hole_width_range:
              - 0
              - 32
            num_holes_range:
              - 1
              - 8
            p: 0.5
          - __class_fullname__: Normalize
            max_pixel_value: 1.0
            mean:
              - 0.43
              - 0.42875
              - 0.47825
              - 0.522
              - 0.5685
              - 0.5725
              - 0.65325
              - 0.9925
            normalization: standard
            p: 1.0
            std:
              - 0.18675
              - 0.1745
              - 0.18475
              - 0.192
              - 0.21225
              - 0.217
              - 0.21225
              - 0.2285
          - __class_fullname__: ToTensorV2
            p: 1.0
            transpose_mask: false
    test_transforms:
      __version__: 2.0.8
      transform:
        __class_fullname__: Compose
        additional_targets: { }
        bbox_params: null
        is_check_shapes: true
        keypoint_params: null
        p: 1
        seed: null
        transforms:
          - __class_fullname__: PadIfNeeded
            border_mode: 0
            fill: 0.0
            fill_mask: 0.0
            min_height: 224
            min_width: 224
            p: 1.0
            pad_height_divisor: null
            pad_width_divisor: null
            padding: 0
            position: center
          - __class_fullname__: Normalize
            max_pixel_value: 4000.0
            mean:
              - 0.43
              - 0.42875
              - 0.47825
              - 0.522
              - 0.5685
              - 0.5725
              - 0.65325
              - 0.9925
            normalization: standard
            p: 1.0
            std:
              - 0.18675
              - 0.1745
              - 0.18475
              - 0.192
              - 0.21225
              - 0.217
              - 0.21225
              - 0.2285
          - __class_fullname__: ToTensorV2
            p: 1.0
            transpose_mask: false

trainer:
  accelerator: auto
  devices: auto
  precision: bf16-mixed
  log_every_n_steps: 20
  max_epochs: 100
  accumulate_grad_batches: 8
  gradient_clip_val: 0.8
  detect_anomaly: false
  default_root_dir: checkpoints
  fast_dev_run: False
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        entity: hakai
        project: kelp-ps8b
        name: upernet_dofa_large
        group: May2026
        log_model: true
        tags:
          - "224_20260519"
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        auto_insert_metric_name: False
        filename: kelp_ps8b_upernet_dofa_large_epoch-{epoch:02d}_val-iou-{val/iou_epoch:.4f}
        monitor: val/iou_epoch
        mode: max
        save_last: True
        save_top_k: 2
        save_weights_only: False
        verbose: True
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/iou_epoch
        mode: max
        patience: 30
        verbose: true
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
